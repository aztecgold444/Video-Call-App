<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Video Call with Speech-to-Text</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header and Controls -->
        <div class="row mb-3 mt-3 justify-content-md-center">
            <div id="user-name" class="col"></div>
            <button id="call" class="btn btn-primary col-1">Call</button>
            <button id="hangup" class="btn btn-danger col-1">Hangup</button>
            <button id="speech-to-text" class="btn btn-success col-2">Start Speech to Text</button>
        </div>

        <!-- Answer Button Section -->
        <div id="answer" class="row mb-3">
            <!-- Dynamic buttons for answering calls will be added here -->
        </div>

        <!-- Videos Section -->
        <div id="videos" class="row mb-3">
            <div id="video-wrapper" class="col">
                <video class="video-player" id="local-video" autoplay playsinline muted></video>
            </div>
            <div class="col">
                <video class="video-player" id="remote-video" autoplay playsinline></video>
            </div>
        </div>

        <!-- Shared Text Box -->
        <div id="shared-text-box" class="shared-text-box">
            <h4>Live Transcription</h4>
            <div id="transcriptions"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="scripts.js"></script>
    <script src="socketListeners.js"></script>
</body>
</html>
